<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08a88a" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icons/tracce.svg" type="image/svg+xml" />
    <link rel="icon" media="(prefers-color-scheme: light)" href="%BASE_URL%icons/tracce-light.svg" type="image/svg+xml" />
    <link rel="icon" media="(prefers-color-scheme: dark)" href="%BASE_URL%icons/tracce-dark.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/tracce-light.svg" />
    <link rel="apple-touch-icon" media="(prefers-color-scheme: dark)" href="%BASE_URL%icons/tracce-dark.svg" />
    <title>Tracce</title>
    <style>
      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #f4faf7;
        color: #0f1d1a;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      .boot-fallback__card {
        width: min(420px, 100%);
      }

      .boot-fallback h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      .boot-fallback p {
        margin: 0;
        color: #53655f;
        line-height: 1.5;
      }

      .boot-fallback button {
        display: none;
        min-height: 46px;
        margin: 20px auto 0;
        border: 0;
        border-radius: 999px;
        padding: 0 20px;
        background: #078b78;
        color: white;
        font: inherit;
        font-weight: 700;
      }

      .boot-fallback.is-stalled button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      @media (prefers-color-scheme: dark) {
        .boot-fallback {
          background: #07110f;
          color: #f5fbf8;
        }

        .boot-fallback p {
          color: #a8bab3;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main id="boot-fallback" class="boot-fallback" role="status" aria-live="polite">
        <div class="boot-fallback__card">
          <h1>Avvio di Tracce…</h1>
          <p id="boot-message">Caricamento dell’applicazione in corso.</p>
          <button id="boot-reset" type="button">Ripristina e ricarica</button>
        </div>
      </main>
    </div>
    <script>
      (() => {
        const fallback = document.getElementById('boot-fallback');
        const message = document.getElementById('boot-message');
        const reset = document.getElementById('boot-reset');

        const showRecovery = () => {
          if (!fallback || !message) return;
          fallback.classList.add('is-stalled');
          message.textContent = 'L’app non si è avviata correttamente. Puoi eliminare la cache tecnica senza cancellare i luoghi salvati.';
        };

        const timer = window.setTimeout(showRecovery, 8000);
        const observer = new MutationObserver(() => {
          if (!document.getElementById('boot-fallback')) {
            window.clearTimeout(timer);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });

        window.addEventListener('error', showRecovery, { once: true });
        window.addEventListener('unhandledrejection', showRecovery, { once: true });

        reset?.addEventListener('click', async () => {
          try {
            if ('serviceWorker' in navigator) {
              const registrations = await navigator.serviceWorker.getRegistrations();
              await Promise.all(registrations.map((registration) => registration.unregister()));
            }
            if ('caches' in window) {
              const names = await caches.keys();
              await Promise.all(names.filter((name) => name.startsWith('tracce-')).map((name) => caches.delete(name)));
            }
          } finally {
            window.location.reload();
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
